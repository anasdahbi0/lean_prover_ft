model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  torch_dtype: "bfloat16"
  trust_remote_code: false

lora:
  r: 32
  lora_alpha: 64
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.1
  bias: "none"

training:
  num_epochs: 3
  per_device_batch_size: 8
  gradient_accumulation_steps: 8    # effective batch = 64
  learning_rate: 2.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  bf16: true
  gradient_checkpointing: false     # H100 80GB handles 4B easily at bs=8
  max_length: 1024
  logging_steps: 20
  save_strategy: "epoch"
  save_total_limit: 3

generation:
  max_new_tokens: 1024
  temperature: 0.6
  n_samples: 32

paths:
  train_data: "data/lean_workbook_train.jsonl"
  checkpoint_dir: "checkpoints/"
  results_dir: "results/"
  data_dir: "data/"

lean_server:
  url: "http://localhost:8000"
  timeout: 60
  max_workers: 32

huggingface:
  push_to_hub: false
  hub_model_id: "yotsubian/qwen-baseline-r32"
