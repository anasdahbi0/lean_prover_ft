model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  # Corrector trains from base Qwen — no prior LoRA checkpoint.
  lora_checkpoint: ""
  torch_dtype: "bfloat16"
  trust_remote_code: false

lora:
  r: 32
  lora_alpha: 64
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.1
  bias: "none"

training:
  num_epochs: 1                   # 249K APRIL examples — 1 epoch is enough
  per_device_batch_size: 8
  gradient_accumulation_steps: 1  # 4× H200: 4 × 8 = 32 effective batch, no accum overhead
  learning_rate: 5.0e-5           # Training from base, not specialising
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  bf16: true
  gradient_checkpointing: true
  max_length: 4096                # APRIL examples can exceed 2K tokens
  logging_steps: 50
  save_strategy: "steps"
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3

generation:
  max_new_tokens: 1024
  temperature: 0.6
  n_samples: 32

paths:
  train_data: "data/april_train.jsonl"   # APRIL repair data only, no synthesis
  val_data:   "data/april_val.jsonl"
  checkpoint_dir: "checkpoints/corrector/"
  results_dir: "results/"
  data_dir: "data/"

lean_server:
  url: "http://localhost:8000"
  timeout: 60
  max_workers: 32

huggingface:
  push_to_hub: true
  hub_model_id: "yotsubian/qwen-corrector"
