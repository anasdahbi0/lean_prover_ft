model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  # Exp A: start from Exp1 LoRA (synthesis specialist), fine-tune on APRIL repair data.
  # This merges the Exp1 LoRA into base weights, then applies a fresh LoRA for APRIL.
  lora_checkpoint: "yotsubian/qwen"
  torch_dtype: "bfloat16"
  trust_remote_code: false

lora:
  r: 32
  lora_alpha: 64
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.1
  bias: "none"

training:
  num_epochs: 1
  per_device_batch_size: 8
  gradient_accumulation_steps: 1  # 4× H200: 4 × 8 = 32 effective batch
  learning_rate: 2.0e-5           # Lower LR — starting from a trained model, not base
  lr_scheduler: "cosine"
  warmup_ratio: 0.05
  bf16: true
  gradient_checkpointing: true
  max_length: 4096
  logging_steps: 50
  save_strategy: "steps"
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3

generation:
  max_new_tokens: 1024
  temperature: 0.6
  n_samples: 32

paths:
  train_data: "data/april_train.jsonl"
  val_data:   "data/april_val.jsonl"
  checkpoint_dir: "checkpoints/exp_a/"
  results_dir: "results/"
  data_dir: "data/"

lean_server:
  url: "http://localhost:8000"
  timeout: 120
  max_workers: 4

huggingface:
  push_to_hub: true
  hub_model_id: "yotsubian/qwen-exp-a"
